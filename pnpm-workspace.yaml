packages:
  - 'apps/*'
  - 'packages/*'
  - 'e2e'

# Security remediation (Phase 6 audit). sharp <0.35.0 inherits libvips CVEs
# (CVE-2026-33327/33328/35590/35591); Next.js pins an older range transitively,
# so force the patched line. This is the one advisory reaching runtime code.
overrides:
  'sharp@<0.35.0': '>=0.35.0'
  # One @types/react across the whole workspace. A split tree (18.x for mobile,
  # 19.x for web) makes tsc see two `ReactNode` types and fail every tsx file;
  # unifying on 19.1.17 (pre-19.2 regression) is the reliable fix.
  '@types/react': '19.1.17'
  '@types/react-dom': '19.1.11'

# pnpm blocks dependency lifecycle scripts by default. These need them:
# esbuild fetches its platform binary, Prisma generates its client and engines.
allowBuilds:
  esbuild: true
  prisma: true
  '@prisma/client': true
  '@prisma/engines': true
  # Install-time analytics pulled in transitively by Prisma. Denied: it reports
  # install events to an external endpoint and nothing here depends on it running.
  '@scarf/scarf': false
  # Native binaries: Next.js image optimisation, and the ESLint module resolver.
  sharp: true
  unrs-resolver: true
  # Unpacks the user-space PostgreSQL binaries used by `pnpm db:local`.
  '@embedded-postgres/windows-x64': true
  # Native transform binary; used by Vitest to emit decorator metadata for Nest.
  '@swc/core': true
  # Optional native accelerator for BullMQ's msgpack serialisation. Denied: it is
  # a pure-JS-fallback optimisation, and the queue is not on a hot path here.
  msgpackr-extract: false
